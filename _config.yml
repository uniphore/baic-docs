title: BAIC Installation Guide
description: Deploy the Uniphore BAIC platform on a Kubernetes cluster you control

# Just-the-Docs — Jekyll theme with left-sidebar nav, full-text search, and
# code-block syntax highlighting. Close in aesthetic to Deepgram / Stripe /
# Algolia docs and works with GitHub Pages "Deploy from branch" out of the
# box (no Gemfile, no GH Actions build step required).
remote_theme: just-the-docs/just-the-docs

# Top-of-page link to the source — convenient for in-house reviewers; remove
# if you don't want a public "view source" link.
gh_edit_link: false

# Search across the published site.
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Site colour scheme. "light" matches the Deepgram look; "dark" is also
# available; set to nil to give users a toggle.
color_scheme: light

# Anchor-link icons next to headings on hover.
heading_anchors: true

# Repo siblings (internal_docs/, terraform/, helm/, .github/, …) live outside
# /docs/ and are never reachable from the published site — Pages "Deploy from
# branch /docs" only serves files inside this folder.